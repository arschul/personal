<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apps</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0e17;
    --surface: #1a1928;
    --surface2: #252438;
    --accent: #f4c842;
    --text: #fffffe;
    --text-muted: #a7a5c0;
    --radius: 18px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
    padding: 48px 28px;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 0; opacity: 0.5;
  }
  .wrap { position: relative; z-index: 1; max-width: 860px; margin: 0 auto; }

  .page-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1rem;
    letter-spacing: 4px;
    color: var(--text-muted);
    margin-bottom: 32px;
    text-transform: uppercase;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 18px;
  }

  .card {
    background: var(--surface);
    border: 2px solid var(--surface2);
    border-radius: var(--radius);
    padding: 24px;
    text-decoration: none;
    color: var(--text);
    display: block;
    transition: border-color 0.22s, transform 0.22s, box-shadow 0.22s;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at top left, rgba(244,200,66,0.07) 0%, transparent 70%);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .card:hover { border-color: var(--accent); transform: translateY(-3px); box-shadow: 0 12px 32px rgba(0,0,0,0.4), 0 0 0 1px rgba(244,200,66,0.1); }
  .card:hover::before { opacity: 1; }

  .card-icon { font-size: 2.4rem; margin-bottom: 14px; display: block; }

  .card-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem;
    letter-spacing: 2px;
    color: var(--accent);
    margin-bottom: 6px;
    line-height: 1;
  }

  .card-desc {
    font-size: 0.84rem;
    font-weight: 700;
    color: var(--text-muted);
    line-height: 1.5;
  }

  .card-tag {
    display: inline-block;
    margin-top: 14px;
    font-size: 0.62rem;
    font-weight: 900;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 3px 9px;
    border-radius: 100px;
    background: rgba(244,200,66,0.12);
    color: var(--accent);
    border: 1px solid rgba(244,200,66,0.25);
  }

  .card-arrow {
    position: absolute;
    bottom: 20px; right: 22px;
    font-size: 1.1rem;
    color: var(--surface2);
    transition: color 0.2s, transform 0.2s;
  }
  .card:hover .card-arrow { color: var(--accent); transform: translateX(3px); }
</style>
</head>
<body>
<div class="wrap">
  <div class="page-title">My Apps</div>
  <div class="grid">

    <a class="card" href="chore-quest.html">
      <span class="card-icon">⚡</span>
      <div class="card-title">Chore Quest</div>
      <div class="card-desc">Daily chore assignment for the whole family. Tracks fairness, points, and progress with a fun animated reveal.</div>
      <span class="card-tag">Family</span>
      <span class="card-arrow">→</span>
    </a>

  </div>
</div>
</body>
</html>
